<!doctype html><html><head><style type="text/css">body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
color:white;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

button{
padding:10px 20px;
font-size:20px;
cursor:pointer;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:20px;
}

canvas{
display:none;
background:#111;
}</style></head><body><!DOCTYPE html>
<html>

<head>
	<title>Trapped</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>

	<div id="menu">
		<h1>Trapped By Math Time</h1>
		<button onclick="startGame()">Start Game</button>
	</div>

	<canvas id="game"></canvas>

	<div id="ui">
		Level: <span id="level">1</span>
	</div>

	<script src="game.js"></script>

</body>

</html><script type="text/javascript">const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
  x: 100,
  y: 100,
  size: 20,
  speed: 4,
  dash: 0
};

let keys = {};
let level = 1;

let enemies = [];

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function startGame() {
  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";
  loadLevel(level);
  gameLoop();
}

function loadLevel(lv) {

  enemies = [];

  for (let i = 0; i < lv + 2; i++) {
    enemies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: 20,
      vx: (Math.random() * 2) - 1,
      vy: (Math.random() * 2) - 1
    });
  }

  document.getElementById("level").innerText = lv;

  player.x = 100;
  player.y = 100;
}

function movePlayer() {

  let sp = player.speed;

  if (keys["Shift"] && player.dash <= 0) {
    sp = 10;
    player.dash = 60;
  }

  if (player.dash > 0) player.dash--;

  if (keys["w"] || keys["ArrowUp"]) player.y -= sp;
  if (keys["s"] || keys["ArrowDown"]) player.y += sp;
  if (keys["a"] || keys["ArrowLeft"]) player.x -= sp;
  if (keys["d"] || keys["ArrowRight"]) player.x += sp;

}

function updateEnemies() {

  for (let e of enemies) {

    e.x += e.vx * 3;
    e.y += e.vy * 3;

    if (e.x < 0 || e.x > canvas.width) e.vx *= -1;
    if (e.y < 0 || e.y > canvas.height) e.vy *= -1;

    let dx = player.x - e.x;
    let dy = player.y - e.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < player.size) {
      death();
    }

  }

}

function death() {
  alert("You died!");
  loadLevel(level);
}

function checkWin() {

  if (player.x > canvas.width - 50) {
    level++;
    loadLevel(level);
  }

}

function draw() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "cyan";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  ctx.fillStyle = "red";

  for (let e of enemies) {
    ctx.fillRect(e.x, e.y, e.size, e.size);
  }

  ctx.fillStyle = "lime";
  ctx.fillRect(canvas.width - 40, canvas.height / 2, 30, 100);

}

function gameLoop() {

  movePlayer();
  updateEnemies();
  checkWin();
  draw();

  requestAnimationFrame(gameLoop);
}</script></body><html>
